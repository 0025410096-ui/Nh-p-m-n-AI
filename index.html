<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>WebAR Mô Hình Cua (GPS-based, Kích thước Cũ) - AR.js</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    
    <a-scene 
      embedded 
      vr-mode-ui="enabled: false" 
      arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-assets>
        <a-asset-item id="bird-obj" src="./assets/10012_crab_v2_iterations-1.obj"></a-asset-item>
        <a-asset-item id="bird-mtl" src="./assets/10012_crab_v2_iterations-1.mtl"></a-asset-item>
      </a-assets>
      
      <a-entity id="crab-entity">
        <a-obj-model 
          src="#bird-obj" 
          mtl="#bird-mtl"
          position="0 -1 -3" scale="0.05 0.05 0.05" rotation="0 0 0">
        </a-obj-model>
      </a-entity>
      
      <a-camera gps-camera="gpsMinDistance: 5; alert: true;" rotation-reader></a-camera>
      
    </a-scene>

    <script>
      const targetLat = 10.421209747684665;
      const targetLng = 105.64382686321106;
      const maxRadius = 100; 

      function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3; 
        const phi1 = lat1 * Math.PI / 180;
        const phi2 = lat2 * Math.PI / 180;
        const deltaPhi = (lat2 - lat1) * Math.PI / 180;
        const deltaLambda = (lon2 - lon1) * Math.PI / 180;

        const a = Math.sin(deltaPhi/2) * Math.sin(deltaPhi/2) +
                  Math.cos(phi1) * Math.cos(phi2) *
                  Math.sin(deltaLambda/2) * Math.sin(deltaLambda/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

        return R * c; 
      }

      window.addEventListener('gps-camera-update-position', (e) => {
        const userLat = e.detail.position.latitude;
        const userLng = e.detail.position.longitude;

        const distance = calculateDistance(userLat, userLng, targetLat, targetLng);
        const crabEntity = document.querySelector('#crab-entity');

        if (distance <= maxRadius) {
          if (!crabEntity.hasAttribute('gps-entity-place')) {
            // Khi lọt vào bán kính 100m, con cua sẽ neo theo tọa độ người dùng để xuất hiện ngay lập tức
            crabEntity.setAttribute('gps-entity-place', `latitude: ${userLat}; longitude: ${userLng};`);
          }
        } else {
          if (crabEntity.hasAttribute('gps-entity-place')) {
            crabEntity.removeAttribute('gps-entity-place');
          }
        }
      });
    </script>
  </body>
</html>
